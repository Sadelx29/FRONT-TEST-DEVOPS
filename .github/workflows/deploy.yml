name: CI/CD Pipeline

on:
  push:
    branches: [main] # Se activa cada vez que subes algo a main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Debug Pipeline Info
        run: |
          echo "Iniciando build para la rama: ${{ github.ref }}"
          echo "Usuario disparador: ${{ github.actor }}"
          echo "Preparando imagen para: ${{ secrets.DOCKER_USERNAME }}/frontend-lab"

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/frontend-lab:latest
          build-args: |
            REACT_APP_API_URL=https://api.tu-app.com
            REACT_APP_ENVIRONMENT=production

  deploy-to-vps:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Executing remote ssh commands
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/frontend-lab:latest
            docker stop mi-front || true
            docker rm mi-front || true
            docker run -d -p 9000:80 --name mi-front ${{ secrets.DOCKER_USERNAME }}/frontend-lab:latest
